name: Publish npm to GitHub Packages

on:
  push:
    branches: [main]
    paths:
      - "npm/http-security-headers/**"
      - ".github/workflows/publish-npm.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@kiurakku"

      - name: Publish @kiurakku/http-security-headers
        run: npm publish
        working-directory: npm/http-security-headers
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
