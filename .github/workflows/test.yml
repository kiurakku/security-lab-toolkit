name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  npm-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm test
        working-directory: npm/http-security-headers
